<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Course Catalog
</title>



<!-- Bootstrap 5 -->

<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">



<!-- Google Font -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


<link
href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
rel="stylesheet">





<style>


body {

    font-family: 'Roboto', sans-serif;

    background:#f5f6f7;

}



.course-card {

    height:100%;

}



.liked-card {

    border:3px solid gold;

    background:#fff8dc;

}



.navbar-brand {

    font-weight:bold;

}


</style>


</head>




<body>




<!-- Authentication Check -->

<script src="assets/js/brainBucketAuth.js"></script>


<script>

if(!window.brainBucketAuth.requireAuth()){

    throw new Error("Authentication required");

}

</script>








<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark">


<div class="container">



<span class="navbar-brand">

Course Catalog System

</span>





<div>


<a

href="pages/admin.html"

class="btn btn-info me-2">

Admin

</a>






<button

class="btn btn-danger"

onclick="logout()">

Sign Out

</button>



</div>



</div>


</nav>









<div class="container mt-5">









<!-- ADD COURSE -->

<div class="card shadow mb-4">


<div class="card-body">


<h3>

Add Course

</h3>





<div class="row g-3">



<div class="col-md-4">


<input

id="courseID"

class="form-control"

placeholder="Course ID">


</div>






<div class="col-md-4">


<input

id="courseName"

class="form-control"

placeholder="Course Name">


</div>






<div class="col-md-4">


<input

id="courseHours"

class="form-control"

placeholder="Credit Hours">


</div>



</div>





<button

class="btn btn-primary mt-3"

onclick="addCourse()">


Add Course


</button>



</div>


</div>













<!-- SEARCH -->

<div class="card shadow mb-4">


<div class="card-body">


<h3>

Search / Filter / Sort

</h3>







<input

id="searchBox"

class="form-control mb-3"

placeholder="Search all courses..."

onkeyup="searchCourses()">








<select

id="tagFilter"

class="form-select mb-3"

onchange="filterCourses()">



<option value="all">

All Tags

</option>




<option value="Programming">

Programming

</option>




<option value="Database">

Database

</option>




<option value="Security">

Security

</option>




<option value="Networking">

Networking

</option>



</select>








<button

class="btn btn-secondary me-2"

onclick="sortTitle()">


Sort By Title


</button>







<button

class="btn btn-secondary"

onclick="sortDate()">


Sort By Date


</button>



</div>


</div>












<!-- JSON / GIST -->

<div class="card shadow mb-4">


<div class="card-body">


<h3>

JSON Storage

</h3>



<p>

Save current course data to GitHub Gist.

</p>







<button

class="btn btn-success me-3"

onclick="saveToGist()">


Save JSON To Gist


</button>








<a

id="gistLink"

target="_blank">

No Gist Saved

</a>




</div>


</div>












<!-- COURSE CARDS -->

<div

id="courseList"

class="row">

</div>







</div>












<!-- APP JAVASCRIPT -->

<script src="assets/js/app.js"></script>







<script>


function logout(){


    window.brainBucketAuth.clearSession();


    window.location.href = "pages/auth.html";


}


</script>






</body>


</html>
