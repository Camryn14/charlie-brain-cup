<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <title>Content Form</title>

</head>

<body>
    <main class="min-vh-100 bg-light py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h1 class="h4 mb-0">
                                <i class="bi bi-pencil-square me-2"></i>Create Content
                            </h1>
                        </div>
                        <div class="card-body p-4">
                            <form id="contentForm" class="needs-validation" novalidate>
                                <!-- Title Field -->
                                <div class="mb-3">
                                    <label for="title" class="form-label">
                                        Title <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="title" name="title"
                                        placeholder="Enter content title" required>
                                    <div class="form-text">Provide a descriptive title for your content.</div>
                                </div>

                                <!-- Author Field -->
                                <div class="mb-3">
                                    <label for="author" class="form-label">
                                        Author <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="author" name="author"
                                        placeholder="Enter author name" required>
                                </div>

                                <!-- Date Field -->
                                <div class="mb-3">
                                    <label for="date" class="form-label">
                                        Date <span class="text-danger">*</span>
                                    </label>
                                    <input type="date" class="form-control" id="date" name="date" required>
                                </div>

                                <!-- Image Upload -->
                                <div class="mb-3">
                                    <label for="image" class="form-label">Featured Image</label>
                                    <input type="file" class="form-control" id="image" name="image" accept="image/*">
                                    <div class="form-text">Upload a featured image (JPG, PNG, GIF)</div>
                                </div>

                                <!-- Description Field -->
                                <div class="mb-3">
                                    <label for="description" class="form-label">
                                        Description <span class="text-danger">*</span>
                                    </label>
                                    <textarea class="form-control" id="description" name="description" rows="5"
                                        placeholder="Enter content description" required></textarea>
                                    <div class="form-text">Provide a detailed description of your content.</div>
                                </div>

                                <!-- Links Section -->
                                <div class="mb-4">
                                    <label class="form-label d-flex justify-content-between align-items-center">
                                        <span>Related Links</span>
                                        <button type="button" class="btn btn-sm btn-outline-primary" id="addLinkBtn"
                                            aria-label="Add another link">
                                            <i class="bi bi-plus-circle me-1"></i>Add Link
                                        </button>
                                    </label>

                                    <div id="linksContainer">
                                        <!-- Links will be added here dynamically -->
                                        <div class="link-item mb-3">
                                            <div class="mb-2">
                                                <input type="url" class="form-control link-input"
                                                    placeholder="https://example.com" aria-label="Link URL">
                                            </div>
                                            <div class="input-group">
                                                <input type="text" class="form-control link-description"
                                                    placeholder="Link description (optional)"
                                                    aria-label="Link description">
                                                <button type="button" class="btn btn-outline-danger remove-link-btn"
                                                    aria-label="Remove this link">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-text">Add multiple links related to your content.</div>
                                </div>

                                <!-- Form Actions -->
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-circle me-2"></i>Submit
                                    </button>
                                    <button type="reset" class="btn btn-secondary">
                                        <i class="bi bi-arrow-counterclockwise me-2"></i>Reset
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/form.js"></script>

</body>

</html>
